name: Publish JavaScript SDK

on:
  push:
    tags:
      - 'js-v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        working-directory: ./js
        run: npm ci

      - name: Run tests
        working-directory: ./js
        run: npm test

      - name: Build package
        working-directory: ./js
        run: npm run build

      - name: Publish to npm
        working-directory: ./js
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            Published to npm

            Install with: `npm install @gridbank/api-js`

            Verify: https://www.npmjs.com/package/@gridbank/api-js
